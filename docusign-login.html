<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Se connecter à Docusign</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --color-bg: #f4f4f4;
      --color-white: #ffffff;
      --color-navy: #1a1a4b;
      --color-purple: #2d0082;
      --color-purple-hover: #3a00a8;
      --color-text: #2c2c54;
      --color-text-light: #555577;
      --color-border: #d0d0e0;
      --color-placeholder: #a0a0b8;
      --color-btn-secondary: #e8e8f0;
      --color-required: #cc0000;
      --font-main: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      font-family: var(--font-main);
      background-color: var(--color-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ── */
    header {
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
      padding: 0 32px;
      height: 60px;
      display: flex;
      align-items: center;
    }

    .logo {
      display: flex;
      align-items: center;
      text-decoration: none;
    }

    .logo svg {
      height: 28px;
      width: auto;
    }

    /* ── MAIN ── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      padding: 48px 48px 40px;
      width: 100%;
      max-width: 540px;
    }

    .card h1 {
      font-size: 26px;
      font-weight: 400;
      color: var(--color-text);
      margin-bottom: 20px;
      letter-spacing: -0.2px;
    }

    .card p {
      font-size: 15px;
      color: var(--color-text-light);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* ── CHAMP EMAIL ── */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--color-text);
      margin-bottom: 6px;
    }

    .field label .required {
      color: var(--color-required);
      margin-left: 2px;
    }

    .field input[type="email"] {
      width: 100%;
      padding: 12px 14px;
      font-size: 15px;
      font-family: var(--font-main);
      color: var(--color-text);
      background: var(--color-white);
      border: 1.5px solid var(--color-border);
      border-radius: 4px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input[type="email"]::placeholder {
      color: var(--color-placeholder);
    }

    .field input[type="email"]:focus {
      border-color: var(--color-purple);
      box-shadow: 0 0 0 3px rgba(45, 0, 130, 0.1);
    }

    .field input[type="email"].error {
      border-color: #c0004e;
    }

    .field-error {
      display: none;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
      font-size: 13px;
      color: #c0004e;
    }

    .field-error.visible {
      display: flex;
    }

    .field-error svg {
      flex-shrink: 0;
    }

    /* ── BOUTONS ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--color-purple);
      color: var(--color-white);
      font-size: 14px;
      font-weight: 700;
      font-family: var(--font-main);
      letter-spacing: 1.2px;
      text-transform: uppercase;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-bottom: 10px;
      transition: background 0.15s ease;
    }

    .btn-primary:hover {
      background: var(--color-purple-hover);
    }

    .btn-primary:active {
      background: #22006a;
    }

    .btn-secondary {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--color-btn-secondary);
      color: var(--color-text);
      font-size: 15px;
      font-weight: 400;
      font-family: var(--font-main);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .btn-secondary:hover {
      background: #dcdcec;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--color-white);
      border-top: 1px solid var(--color-border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }

    .footer-brand {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--color-text-light);
    }

    .footer-brand strong {
      font-weight: 600;
      color: var(--color-navy);
    }

    .footer-nav {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-wrap: wrap;
    }

    .footer-nav a {
      font-size: 13px;
      color: var(--color-text-light);
      text-decoration: none;
      padding: 0 8px;
      transition: color 0.12s;
    }

    .footer-nav a:hover {
      color: var(--color-purple);
      text-decoration: underline;
    }

    .footer-lang {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 13px;
      color: var(--color-text-light);
      cursor: pointer;
    }

    .footer-lang select {
      font-size: 13px;
      font-family: var(--font-main);
      color: var(--color-text-light);
      background: transparent;
      border: none;
      cursor: pointer;
      outline: none;
    }

    .footer-copy {
      font-size: 12px;
      color: var(--color-text-light);
      white-space: nowrap;
    }
  </style>
</head>

  <!-- MAIN -->
  <main>
    <div class="card">
      <h1>Se connecter à Docusign</h1>
      <p>Saisissez votre adresse e-mail pour vous connecter.</p>

      <div class="field">
        <label for="email">
          Adresse e-mail <span class="required">*</span>
        </label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="Saisissez une adresse e-mail"
          autocomplete="email"
        />
        <div class="field-error" id="email-error">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="8" cy="8" r="7.5" stroke="#c0004e"/>
            <line x1="5.5" y1="5.5" x2="10.5" y2="10.5" stroke="#c0004e" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="10.5" y1="5.5" x2="5.5" y2="10.5" stroke="#c0004e" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          L'e-mail doit avoir une valeur.
        </div>
      </div>

      <button class="btn-primary" type="button" onclick="
        var input = document.getElementById('email');
        var error = document.getElementById('email-error');
        if (!input.value.trim()) {
          input.classList.add('error');
          error.classList.add('visible');
        } else {
          input.classList.remove('error');
          error.classList.remove('visible');
        }
      ">SUIVANT</button>
      <button class="btn-secondary" type="button">S'inscrire gratuitement</button>
    </div>
  </main>
