<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Microsoft – Se connecter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', -apple-system, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #e8eaf6 0%, #f3e5f5 30%, #e3f2fd 60%, #f1f8e9 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 4rem;
      position: relative;
    }

    .ms-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 2px;
      padding: 44px 44px 36px;
      width: 460px;
      max-width: 100%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .ms-logo {
      margin-bottom: 20px;
    }

    .ms-logo img {
      height: 24px;
      width: auto;
      display: block;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1b1b1b;
      margin-bottom: 20px;
    }

    .ms-input {
      width: 100%;
      border: none;
      border-bottom: 1px solid #666;
      padding: 6px 0;
      font-size: 15px;
      font-family: inherit;
      color: #1b1b1b;
      background: transparent;
      outline: none;
      margin-bottom: 20px;
    }

    .ms-input::placeholder { color: #767676; }
    .ms-input:focus { border-bottom: 2px solid #0067b8; }

    .ms-error {
      display: none;
      font-size: 12px;
      color: #d93025;
      margin-top: -16px;
      margin-bottom: 16px;
    }

    .ms-links {
      font-size: 13px;
      margin-bottom: 20px;
      color: #1b1b1b;
    }

    .ms-links a,
    .ms-link-standalone {
      color: #0067b8;
      text-decoration: none;
    }

    .ms-links a:hover,
    .ms-link-standalone:hover {
      text-decoration: underline;
    }

    .ms-link-standalone {
      display: block;
      font-size: 13px;
      margin-bottom: 24px;
    }

    .ms-btn-row {
      display: flex;
      justify-content: flex-end;
    }

    .ms-btn {
      background: #0067b8;
      color: #fff;
      border: none;
      padding: 8px 20px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      min-width: 108px;
    }

    .ms-btn:hover { background: #005a9e; }

    .ms-options-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      margin-top: 12px;
      width: 460px;
      max-width: 100%;
      padding: 14px 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-size: 14px;
      color: #1b1b1b;
    }

    .ms-options-card:hover { background: #f5f5f5; }

    .ms-options-card img {
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .ms-footer {
      position: fixed;
      bottom: 16px;
      right: 16px;
      display: flex;
      gap: 20px;
      font-size: 11px;
      color: #767676;
    }

    .ms-footer a {
      color: #767676;
      text-decoration: none;
    }

    .ms-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="ms-card">
    <div class="ms-logo">
      <img src="microsoft_logo_564db913a7fa0ca42727161c6d031bef.svg" alt="Microsoft" />
    </div>

    <h1>Se connecter</h1>

    <input
      class="ms-input"
      id="email-input"
      type="email"
      placeholder="E-mail, téléphone ou identifiant Skype"
    />
    <span class="ms-error" id="ms-error">Entrez une adresse e-mail, un téléphone ou un identifiant Skype.</span>

    <p class="ms-links">
      Vous n'avez pas encore de compte ? <a href="#">Créez-en un !</a>
    </p>

    <a href="#" class="ms-link-standalone">Votre compte n'est pas accessible ?</a>

    <div class="ms-btn-row">
      <button class="ms-btn" id="suivant-btn">Suivant</button>
    </div>
  </div>

  <div class="ms-options-card">
    <img src="signin-options_3e3f6b73c3f310c31d2c4d131a8ab8c6.svg" alt="Options de connexion" />
    Options de connexion
  </div>

  <footer class="ms-footer">
    <a href="#">Conditions d'utilisation</a>
    <a href="#">Confidentialité et cookies</a>
    <span>Accessibilité : partiellement conforme</span>
    <span>···</span>
  </footer>

  <script>
    const btn = document.getElementById('suivant-btn');
    const input = document.getElementById('email-input');
    const error = document.getElementById('ms-error');

    btn.addEventListener('click', function () {
      if (input.value.trim() === '') {
        input.style.borderBottom = '2px solid #d93025';
        error.style.display = 'block';
        input.focus();
      } else {
        input.style.borderBottom = '';
        error.style.display = 'none';
        // Redirige vers la page suivante (à adapter)
        window.location.href = 'password.html';
      }
    });

    // Réinitialise l'erreur quand l'utilisateur retape
    input.addEventListener('input', function () {
      if (input.value.trim() !== '') {
        input.style.borderBottom = '';
        error.style.display = 'none';
      }
    });
  </script>

</body>
</html>
