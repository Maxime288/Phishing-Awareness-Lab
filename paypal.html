<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PayPal - Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .wrapper {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 40px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e0e0e0;
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      margin-bottom: 60px;
      color: #000;
    }

    .input-wrapper {
      position: relative;
      margin-bottom: 14px;
    }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
      color: #333;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #0070E0;
    }

    input[type="text"].error {
      border-color: #cc0000;
    }

    .error-icon {
      display: none;
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
    }

    .error-icon svg {
      width: 22px;
      height: 22px;
    }

    .error-message {
      display: none;
      align-items: center;
      gap: 6px;
      color: #cc0000;
      font-size: 13px;
      margin-top: 6px;
      margin-bottom: 8px;
    }

    .error-message svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
    }

    .show-error .error-icon,
    .show-error .error-message {
      display: flex;
    }

    .forgot-link {
      display: block;
      font-size: 14px;
      color: #0070E0;
      font-weight: 700;
      text-decoration: none;
      margin-bottom: 24px;
    }

    .forgot-link:hover { text-decoration: underline; }

    .btn-primary {
      width: 100%;
      padding: 15px;
      background: #0033cc;
      color: #fff;
      border: none;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 20px;
      transition: background 0.2s;
    }

    .btn-primary:hover { background: #0029a3; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .divider::before,
    .divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #ddd;
    }

    .divider span {
      font-size: 14px;
      color: #666;
    }

    .btn-secondary {
      width: 100%;
      padding: 15px;
      background: transparent;
      color: #333;
      border: 2px solid #000;
      border-radius: 40px;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-secondary:hover {
      border-color: #0070E0;
      color: #0070E0;
    }

    .lang-switcher {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 40px;
      font-size: 14px;
    }

    .flag {
      display: inline-flex;
      width: 22px;
      height: 15px;
      border-radius: 2px;
      overflow: hidden;
      border: 1px solid #ddd;
    }

    .flag span {
      flex: 1;
      height: 100%;
    }

    .flag-blue  { background: #002395; }
    .flag-white { background: #ffffff; }
    .flag-red   { background: #ED2939; }

    .lang-switcher .active { font-weight: 700; color: #000; }
    .lang-switcher .sep { color: #bbb; }
    .lang-switcher .inactive { color: #555; }

    footer {
      width: 100%;
      background: #eee;
      padding: 18px 16px;
      text-align: center;
    }

    footer a {
      font-size: 13px;
      color: #555;
      text-decoration: none;
      margin: 0 10px;
    }

    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="card">
      <h1>PayPal</h1>

      <div class="input-wrapper" id="inputWrapper">
        <input type="text" id="emailInput" placeholder="Email ou numéro de mobile" />
        <div class="error-icon">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <polygon points="12,2 22,22 2,22" fill="#cc0000"/>
            <line x1="12" y1="9" x2="12" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
            <circle cx="12" cy="19" r="1.5" fill="white"/>
          </svg>
        </div>
      </div>

      <div class="error-message" id="errorMessage">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <polygon points="12,2 22,22 2,22" fill="#cc0000"/>
          <line x1="12" y1="9" x2="12" y2="15" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="12" cy="19" r="1.5" fill="white"/>
        </svg>
        Obligatoire
      </div>

      <a href="#" class="forgot-link">Adresse email oubliée ?</a>

      <button class="btn-primary" onclick="valider()">Suivant</button>

      <div class="divider"><span>ou</span></div>

      <button class="btn-secondary">Ouvrir un compte</button>
      <br>
      <br></br>
      <div class="lang-switcher">
        <div class="flag">
          <span class="flag-blue"></span>
          <span class="flag-white"></span>
          <span class="flag-red"></span>
        </div>
        <span>&#8964;</span>
        <span class="active">Français</span>
        <span class="sep">|</span>
        <span class="inactive">English</span>
      </div>
    </div>
  </div>

  <footer>
    <a href="#">Contact</a>
    <a href="#">Respect de la vie privée</a>
    <a href="#">Contrats d'utilisation</a>
    <a href="#">International</a>
  </footer>

  <script>
    const input = document.getElementById('emailInput');
    const wrapper = document.getElementById('inputWrapper');
    const errorMessage = document.getElementById('errorMessage');

    function valider() {
      if (input.value.trim() === '') {
        input.classList.add('error');
        wrapper.classList.add('show-error');
        errorMessage.style.display = 'flex';
      } else {
        input.classList.remove('error');
        wrapper.classList.remove('show-error');
        errorMessage.style.display = 'none';
      }
    }

    input.addEventListener('input', function () {
      if (input.value.trim() !== '') {
        input.classList.remove('error');
        wrapper.classList.remove('show-error');
        errorMessage.style.display = 'none';
      }
    });
  </script>

</body>
</html>
